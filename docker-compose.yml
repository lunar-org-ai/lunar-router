# ============================================================================
# OpenTracy — Full Stack
# ============================================================================
#
# Start everything:   docker compose up -d
# Update & restart:   docker compose up -d --build
# View logs:          docker compose logs -f
# View traces:        docker compose exec clickhouse clickhouse-client \
#                       --database opentracy --password opentracy \
#                       -q "SELECT * FROM llm_traces ORDER BY timestamp DESC LIMIT 10"
# Tear down:          docker compose down -v
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # ClickHouse — trace storage
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: opentracy
      CLICKHOUSE_DB: opentracy
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "opentracy", "-q", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # Go Engine — routing + provider proxy
  # --------------------------------------------------------------------------
  opentracy-engine:
    build:
      context: ./go
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Gateway mode (no weights, no semantic routing). To enable model="auto",
    # download weights into the weights-data volume and switch this back to
    # ["--weights", "/weights/bootstrap", "--host", "0.0.0.0", "--port", "8080"]
    # plus set ONNXRUNTIME_LIB_PATH below.
    command: ["--gateway", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      OPENTRACY_CH_ENABLED: "true"
      OPENTRACY_CH_HOST: clickhouse
      OPENTRACY_CH_PORT: "9000"
      OPENTRACY_CH_DATABASE: opentracy
      OPENTRACY_CH_USERNAME: default
      OPENTRACY_CH_PASSWORD: opentracy
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - weights-data:/weights
      - opentracy-secrets:/root/.opentracy
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Python API — FastAPI wrapper + analytics endpoints
  # --------------------------------------------------------------------------
  opentracy-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # GPU is optional. Default `runc` runtime works on CPU-only hosts
    # (e.g. cloud dev VMs without nvidia-container-toolkit). To enable
    # GPU acceleration for local training/inference, run with:
    #   DOCKER_RUNTIME=nvidia docker compose up -d
    runtime: ${DOCKER_RUNTIME:-runc}
    ports:
      - "8000:8000"
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      OPENTRACY_CH_ENABLED: "true"
      OPENTRACY_CH_HOST: clickhouse
      OPENTRACY_CH_HTTP_PORT: "8123"
      OPENTRACY_CH_DATABASE: opentracy
      OPENTRACY_CH_USERNAME: default
      OPENTRACY_CH_PASSWORD: opentracy
      OPENTRACY_ENGINE_URL: http://opentracy-engine:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTO_OPERATOR: ${AUTO_OPERATOR:-false}
      AUTO_TRAINER: ${AUTO_TRAINER:-false}
      # Phase 1 + 1.5 harness redesign — drives the trigger engine
      # that populates the ledger, and exposes /mcp for Claude Code ops.
      OPENTRACY_TRIGGER_ENGINE_ENABLED: ${OPENTRACY_TRIGGER_ENGINE_ENABLED:-true}
      OPENTRACY_TRIGGER_ENGINE_INTERVAL_SECONDS: ${OPENTRACY_TRIGGER_ENGINE_INTERVAL_SECONDS:-60}
      OPENTRACY_MCP_HTTP_ENABLED: ${OPENTRACY_MCP_HTTP_ENABLED:-true}
    volumes:
      - weights-data:/app/weights
      - opentracy-secrets:/root/.opentracy
      - distillation-data:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --------------------------------------------------------------------------
  # UI — React dashboard (nginx + static build)
  # --------------------------------------------------------------------------
  opentracy-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
        VITE_ROUTER_URL: "/engine"
        VITE_STATS_URL: "/api"
        VITE_ENVIRONMENT: "prod"
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      opentracy-api:
        condition: service_healthy
      opentracy-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  clickhouse-data:
  weights-data:
  opentracy-secrets:
  distillation-data:
