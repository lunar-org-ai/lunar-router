[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lunar-router"
version = "0.1.0"
description = "Lunar Router - Intelligent LLM Routing for Efficient Inference"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Lunar Team"}
]
keywords = ["llm", "routing", "ai", "machine-learning", "semantic-routing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "numpy>=1.24.0",
    "tqdm>=4.65.0",
]

[project.optional-dependencies]
openai = [
    "openai>=1.0.0",
]
anthropic = [
    "anthropic>=0.18.0",
]
mistral = [
    "mistralai>=0.1.0",
]
google = [
    "google-generativeai>=0.3.0",
]
groq = [
    "groq>=0.4.0",
]
embeddings = [
    "sentence-transformers>=2.2.0",
]
training = [
    "scikit-learn>=1.3.0",
]
api = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "pydantic>=2.0.0",
]
s3 = [
    "boto3>=1.28.0",
]
huggingface = [
    "huggingface_hub>=0.16.0",
]
mcp = [
    "mcp>=1.0.0",
]
all = [
    "lunar-router[openai,anthropic,mistral,google,groq,embeddings,training,api,s3,huggingface,mcp]",
]
dev = [
    "lunar-router[all]",
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/pureai-ecosystem/lunar-router"
Documentation = "https://github.com/pureai-ecosystem/lunar-router#readme"
Repository = "https://github.com/pureai-ecosystem/lunar-router"

[project.scripts]
lunar-router = "lunar_router.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["lunar_router*"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # function calls in argument defaults
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
