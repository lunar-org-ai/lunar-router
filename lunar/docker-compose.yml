version: '3.8'

services:
  lunar-router:
    build:
      context: ./router
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LUNAR_DEV_MODE=true
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - ./router/.env
    volumes:
      - ./router/data:/app/data
      - ./router/app/data/uniroute_state:/app/app/data/uniroute_state
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
